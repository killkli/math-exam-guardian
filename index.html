<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>數學會考題庫 ｜ 國中教育會考 102-114</title>
  <meta name="description" content="國中教育會考數學科歷屆試題線上瀏覽，102-114學年度完整收錄，支援 KaTeX 數學公式渲染。" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ═══ HEADER ══════════════════════════════════════════════════════════════ -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">∑</span>
      <div>
        <div class="logo-title">數學會考題庫</div>
        <div class="logo-sub">國中教育會考 · 102-114 學年度</div>
      </div>
    </div>
    <div class="header-stats">
      <div class="stat">
        <span class="stat-num" id="stat-total">—</span>
        <span class="stat-label">歷屆試題</span>
      </div>
      <div class="stat">
        <span class="stat-num">13</span>
        <span class="stat-label">年度區間</span>
      </div>
      <div class="stat">
        <span class="stat-num">102-114</span>
        <span class="stat-label">學年度</span>
      </div>
    </div>
  </div>
</header>

<!-- ═══ HERO ════════════════════════════════════════════════════════════════ -->
<section class="hero">
  <div class="hero-inner">
    <h1 class="hero-title">掌握每一題<span class="accent">，贏在每一分</span></h1>
    <p class="hero-desc">完整收錄 102 至 114 學年度國中教育會考數學科試題，附年分、類型、難度、主題多重篩選，數學公式即時渲染，隨時隨地高效複習。</p>
    <div class="hero-search">
      <i data-lucide="search" class="search-icon"></i>
      <input type="text" id="search-input" placeholder="搜尋題目關鍵字，例如：機率、圓、方程式..." autocomplete="off" />
      <button id="search-clear" class="search-clear" style="display:none">
        <i data-lucide="x"></i>
      </button>
    </div>
  </div>
</section>

<!-- ═══ MAIN LAYOUT ════════════════════════════════════════════════════════ -->
<div class="layout">

  <!-- SIDEBAR FILTERS -->
  <aside class="sidebar" id="sidebar">
    <div class="filter-section">
      <h3 class="filter-title">年度</h3>
      <div class="filter-chips" id="filter-year">
        <!-- generated by JS -->
      </div>
    </div>

    <div class="filter-section">
      <h3 class="filter-title">題型</h3>
      <div class="filter-chips" id="filter-type">
        <button class="chip active" data-val="all">全部</button>
        <button class="chip" data-val="choice">選擇題</button>
        <button class="chip" data-val="essay">非選題</button>
      </div>
    </div>

    <div class="filter-section">
      <h3 class="filter-title">難度</h3>
      <div class="filter-chips" id="filter-difficulty">
        <!-- generated by JS -->
      </div>
    </div>

    <div class="filter-section">
      <h3 class="filter-title">主題</h3>
      <select id="filter-concept" class="concept-select">
        <option value="all">全部主題</option>
      </select>
    </div>

    <div class="filter-section">
      <h3 class="filter-title">QA 狀態</h3>
      <div class="filter-chips" id="filter-quality">
        <button class="chip active" data-val="all">全部</button>
        <button class="chip" data-val="PASS">已審核</button>
        <button class="chip" data-val="FIXED">已修正</button>
      </div>
    </div>

    <button id="filter-reset" class="btn-reset">
      <i data-lucide="rotate-ccw"></i> 重置篩選
    </button>
  </aside>

  <!-- CONTENT AREA -->
  <main class="content">

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-left">
        <span class="result-count" id="result-count">— 筆結果</span>
      </div>
      <div class="toolbar-right">
        <button id="btn-grid" class="view-btn active" title="網格檢視">
          <i data-lucide="layout-grid"></i>
        </button>
        <button id="btn-list" class="view-btn" title="列表檢視">
          <i data-lucide="list"></i>
        </button>
      </div>
    </div>

    <!-- Question Grid -->
    <div class="question-grid" id="question-grid"></div>

    <!-- Empty State -->
    <div class="empty-state" id="empty-state" style="display:none">
      <div class="empty-icon">📭</div>
      <p>找不到符合條件的題目</p>
      <button id="empty-reset" class="btn-primary">重置篩選</button>
    </div>

    <!-- Load More -->
    <div class="load-more-wrap" id="load-more-wrap" style="display:none">
      <button id="load-more" class="btn-primary">載入更多</button>
    </div>

  </main>
</div>

<!-- ═══ ANSWER MODAL ════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close">
      <i data-lucide="x"></i>
    </button>
    <div class="modal-header" id="modal-header"></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- ═══ FOOTER ════════════════════════════════════════════════════════════════ -->
<footer class="site-footer">
  <p>資料來源：國中教育會考歷屆試題 ｜ Designed by Hermes Agent</p>
</footer>

<script src="app.js"></script>
</body>
</html>
